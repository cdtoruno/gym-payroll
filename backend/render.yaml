services:
  - type: web
    name: gym-payroll-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn gym_payroll.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: gym-payroll-db
          property: connectionString
